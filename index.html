<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons+Sharp">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <aside class="side-Portion">
            <div class="top">
                <div class="logo">
                    <img src="./assets/image.png" alt="">
                    <h1>WeatherAajKal</h1>
                </div>
            </div>
            <div class="sidebar">
                <a href="#">
                    <span class="material-icons-sharp">grid_view</span>
                    <h3>Dashboard</h3>
                </a>
                <a href="map.html">
                    <span class="material-symbols-outlined">map</span>
                    <h3>Map View</h3>
                </a>
                <a href="#">
                    <span class="material-symbols-outlined">release_alert</span>
                    <h3>Alerts</h3>
                </a>
            </div>
            <div class="theme">
                <label class="switch">
                <input type="checkbox">
                <span class="slider"></span>
                </label>
            </div>
        </aside>
        <main class="main">
            <h1 id="cityname"></h1>
            <div class="inputs">
                <input type="text" placeholder="Search City or Zip Code..." id="search" value="Pune">
                <button class="searchbtn" id="searchbtn"><span class="material-symbols-outlined">search</span></button>
            </div>
            <div class="hero">
                <div class="display">
                    <div class="images"></div>
                    <p id="clouddetail"></p>
                    <h2 id="temp"></h2>
                    <div class="moredetail">
                        <p id="humidity"></p>
                        <p id="wind"></p>
                        <p id="feelslike"></p>
                    </div>

                </div>
                <div class="subhero">
                    <div class="wear">
                        <div class="wear-header">👕 WHAT TO WEAR</div>
                        <h2 id="wearTitle"></h2>
                        <p id="wearDesc"></p>
                    </div>
                    <div class="precipitation">
                        <div class="highlight">
                            <div class="item">🌧 Rain Chance: <span id="rainChance">--</span>%</div>
                            <div class="item">🌬 Wind Status: <span id="windStatus">--</span></div>
                            <div class="item">💧 Humidity Level: <span id="humidStatus">--</span></div>
                            <div class="item">🌡 Comfort: <span id="comfort">--</span></div>
                        </div>
                    </div>
                </div>
            </div>
            <h3>5-Day Forecast</h3>
            <div id="forecast">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div></div>
            </div>
            <div class="global">
                <div class="global-header">
                    <div>
                        <h2>Global Weather Overview</h2>
                        <p>Compare real-time data across key hubs</p>
                    </div>

                    <div class="controls">
                        <span>MIN TEMP: <b id="minTemp">0°C</b></span>

                        <input type="range" id="tempRange" min="0" max="50" value="0">

                        <button id="sortLow" class="sort-btn">Temp ↓</button>
                        <button id="sortHigh" class="sort-btn">Temp ↑</button>
                    </div>
                </div>

                <div id="cityList"></div>

                <button id="loadMore">Load More Cities</button>
            </div>
        </main>
    </div>
<script src="script.js"></script>
</body>
</html>
